<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winterfell Admin</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1, h2 { color: #1a1a1a; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { background: #0066ff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button.delete-btn { background: #ff3333; }
    button:hover { opacity: 0.9; }
    .product-list { margin-top: 20px; }
    .product-item { display: flex; gap: 16px; align-items: center; border-bottom: 1px solid #eee; padding: 12px 0; }
    .product-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    .product-info { flex: 1; }
    .product-actions { display: flex; gap: 8px; }
    .login-section { text-align: center; margin-top: 80px; }
    .admin-content { display: none; }
    .form-row { display: flex; gap: 12px; }
    .form-row > div { flex: 1; }
  </style>
</head>
<body>
  <div id="loginSection" class="card login-section">
    <h1>Admin Login</h1>
    <input type="password" id="adminToken" placeholder="Enter Admin Token" style="max-width: 300px; margin: 0 auto; display: block;">
    <button onclick="login()" style="margin-top: 12px;">Login</button>
  </div>

  <div id="adminContent" class="admin-content">
    <h1>Winterfell Admin Panel</h1>
    <div class="card">
      <h2>Add / Edit Product</h2>
      <form id="productForm" enctype="multipart/form-data">
        <input type="hidden" id="productId">
        <div class="form-row">
          <div><input type="text" id="name" placeholder="Product Name" required></div>
          <div><input type="number" id="price" placeholder="Price (KES)" required></div>
        </div>
        <div class="form-row">
          <div>
            <select id="category" required>
              <option value="PHONES">PHONES</option><option value="LAPTOP">LAPTOP</option>
              <option value="Powerbank">Powerbank</option><option value="Chargers">Chargers</option>
              <option value="headphones">Headphones</option><option value="ACCESSORIES">ACCESSORIES</option>
              <option value="Monitors">Monitors</option><option value="Home Appliances">Home Appliances</option>
            </select>
          </div>
          <div><input type="text" id="brand" placeholder="Brand"></div>
        </div>
        <textarea id="description" placeholder="Description" rows="3"></textarea>
        <div class="form-row">
          <div><input type="text" id="colors" placeholder='Colors (JSON array) e.g. ["Black","White"]'></div>
          <div><textarea id="specs" placeholder='Specs (JSON object) e.g. {"display":"6.7","battery":"5000mAh"}' rows="2"></textarea></div>
        </div>
        <input type="file" id="image" accept="image/*">
        <input type="hidden" id="existingImage">
        <button type="submit">Save Product</button>
        <button type="button" onclick="resetForm()" style="background: #666;">Cancel</button>
      </form>
    </div>

    <div class="card">
      <h2>Existing Products</h2>
      <div id="productList" class="product-list"></div>
    </div>
  </div>

  <script>
    let token = '';

    function login() {
      token = document.getElementById('adminToken').value;
      if (!token) return alert('Enter token');
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      loadProducts();
    }

    async function apiCall(endpoint, options = {}) {
      const headers = { 'Authorization': `Bearer ${token}`, ...options.headers };
      const response = await fetch(endpoint, { ...options, headers });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    }

    async function loadProducts() {
      const res = await fetch('/api/products');
      const products = await res.json();
      const container = document.getElementById('productList');
      container.innerHTML = products.map(p => `
        <div class="product-item">
          <img src="${p.image || 'https://via.placeholder.com/60'}" onerror="this.src='https://via.placeholder.com/60'">
          <div class="product-info"><strong>${p.name}</strong><br>KES ${p.price.toLocaleString()} | ${p.category}</div>
          <div class="product-actions">
            <button onclick="editProduct('${p.id}')">Edit</button>
            <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      await apiCall(`/api/admin/products/${id}`, { method: 'DELETE' });
      loadProducts();
    }

    async function editProduct(id) {
      const res = await fetch(`/api/products/${id}`);
      const p = await res.json();
      document.getElementById('productId').value = p.id;
      document.getElementById('name').value = p.name;
      document.getElementById('price').value = p.price;
      document.getElementById('category').value = p.category;
      document.getElementById('brand').value = p.brand || '';
      document.getElementById('description').value = p.description || '';
      document.getElementById('colors').value = JSON.stringify(p.colors);
      document.getElementById('specs').value = JSON.stringify(p.specs);
      document.getElementById('existingImage').value = p.image || '';
      document.getElementById('image').value = '';
    }

    function resetForm() {
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('productId').value;
      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('price', document.getElementById('price').value);
      formData.append('category', document.getElementById('category').value);
      formData.append('brand', document.getElementById('brand').value);
      formData.append('description', document.getElementById('description').value);
      formData.append('colors', document.getElementById('colors').value);
      formData.append('specs', document.getElementById('specs').value);
      const imageFile = document.getElementById('image').files[0];
      if (imageFile) formData.append('image', imageFile);
      else formData.append('existingImage', document.getElementById('existingImage').value);

      const url = id ? `/api/admin/products/${id}` : '/api/admin/products';
      const method = id ? 'PUT' : 'POST';
      await apiCall(url, { method, body: formData });
      loadProducts();
      resetForm();
    });
  </script>
</body>
</html>
